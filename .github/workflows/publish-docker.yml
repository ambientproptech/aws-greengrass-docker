name: Publish Docker image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - greengrass-entrypoint.sh
      - .github/workflows/publish-docker.yml

concurrency:
  group: publish-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (GHCR requires lowercase)
        run: |
          echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set GHCR package visibility to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PKG=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          OWNER='${{ github.repository_owner }}'
          if [ "${{ github.event.repository.owner.type }}" = "Organization" ]; then
            gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${OWNER}/packages/container/${PKG}" \
              -f visibility=public
          else
            gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${PKG}" \
              -f visibility=public
          fi
